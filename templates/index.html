<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrafficIQ — Intelligence Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080c10;
  --surface:   #0d1420;
  --surface2:  #111926;
  --border:    #1e2d42;
  --accent:    #00e5ff;
  --accent2:   #ff3b5c;
  --accent3:   #39ff7a;
  --text:      #c8d8e8;
  --text-dim:  #5a7a96;
  --glow:      0 0 18px rgba(0,229,255,.35);
  --red-glow:  0 0 18px rgba(255,59,92,.40);
  --green-glow:0 0 12px rgba(57,255,122,.30);
  --radius:    8px;
  --mono:      'Space Mono', monospace;
  --display:   'Syne', sans-serif;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--display);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scanline overlay ──────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
  );
}

/* ── Noise grain overlay ───────────────────────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 9998;
  opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ── Header ────────────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem;
  height: 60px;
  background: rgba(13,20,32,.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 200;
}

.logo {
  display: flex; align-items: center; gap: .75rem;
  font-size: 1.1rem; font-weight: 800; letter-spacing: .08em; color: #fff;
}
.logo-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
  box-shadow: var(--glow);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .6; transform: scale(.85); }
}

.header-time {
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--text-dim);
  letter-spacing: .12em;
}

.status-pill {
  display: flex; align-items: center; gap: .5rem;
  padding: .3rem .75rem;
  border: 1px solid var(--accent3);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--accent3);
  letter-spacing: .1em;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent3);
  box-shadow: var(--green-glow);
  animation: pulse 1.4s ease-in-out infinite;
}

/* ── Layout ────────────────────────────────────────────────────────── */
.app-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr;
  height: calc(100vh - 60px);
}

/* ── Stats bar ─────────────────────────────────────────────────────── */
.stats-bar {
  grid-column: 1 / -1;
  display: flex; gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}

.stat-card {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: .2rem;
  padding: .75rem 1rem;
  background: var(--surface);
  animation: fadeUp .6s ease both;
}
.stat-card:nth-child(2) { animation-delay:.1s; }
.stat-card:nth-child(3) { animation-delay:.2s; }
.stat-card:nth-child(4) { animation-delay:.3s; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.stat-value {
  font-family: var(--mono);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  text-shadow: var(--glow);
  transition: all .4s ease;
}
.stat-value.alert { color: var(--accent2); text-shadow: var(--red-glow); }
.stat-label {
  font-size: .6rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* ── Camera grid ───────────────────────────────────────────────────── */
.camera-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 1px;
  background: var(--border);
  overflow-y: auto;
  padding: 0;
}

.cam-tile {
  position: relative;
  background: var(--surface);
  display: flex; flex-direction: column;
  animation: fadeIn .7s ease both;
}
.cam-tile:nth-child(2) { animation-delay:.15s; }
.cam-tile:nth-child(3) { animation-delay:.3s; }
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}

.cam-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: .55rem .9rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.cam-name {
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text);
}
.cam-meta {
  display: flex; align-items: center; gap: .5rem;
}
.cam-badge {
  font-family: var(--mono);
  font-size: .6rem;
  padding: .15rem .45rem;
  border-radius: 3px;
  letter-spacing: .05em;
  background: rgba(0,229,255,.1);
  border: 1px solid rgba(0,229,255,.25);
  color: var(--accent);
}
.cam-badge.red {
  background: rgba(255,59,92,.12);
  border-color: rgba(255,59,92,.3);
  color: var(--accent2);
}

.cam-feed {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: #020408;
}
.cam-feed img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
/* Corner brackets */
.cam-feed::before, .cam-feed::after {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  border-color: var(--accent);
  border-style: solid;
  opacity: .7;
  z-index: 2;
}
.cam-feed::before { top:8px; left:8px; border-width:2px 0 0 2px; }
.cam-feed::after  { bottom:8px; right:8px; border-width:0 2px 2px 0; }

.cam-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: flex-end;
  padding: .5rem;
  background: linear-gradient(transparent 50%, rgba(8,12,16,.7) 100%);
  pointer-events: none;
}
.cam-stats-row {
  display: flex; gap: .5rem;
}
.cam-stat-chip {
  font-family: var(--mono);
  font-size: .6rem;
  padding: .2rem .5rem;
  border-radius: 3px;
  background: rgba(8,12,16,.75);
  border: 1px solid var(--border);
  color: var(--text-dim);
  letter-spacing: .06em;
}

.rec-indicator {
  position: absolute; top: 10px; right: 10px;
  display: flex; align-items: center; gap: .3rem;
  font-family: var(--mono); font-size: .55rem;
  color: var(--accent2); letter-spacing: .1em;
  background: rgba(8,12,16,.65);
  padding: .2rem .45rem; border-radius: 3px;
  border: 1px solid rgba(255,59,92,.3);
}
.rec-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent2);
  animation: pulse .9s ease-in-out infinite;
}

/* ── Alerts panel ──────────────────────────────────────────────────── */
.alerts-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: .85rem 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.panel-title {
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text);
}
.clear-btn {
  font-family: var(--mono);
  font-size: .6rem;
  color: var(--text-dim);
  cursor: pointer;
  background: none; border: none;
  letter-spacing: .08em;
  padding: .25rem .5rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: all .2s;
}
.clear-btn:hover { color: var(--accent2); border-color: var(--accent2); }

.alerts-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.alert-item {
  padding: .75rem 1rem;
  border-bottom: 1px solid var(--border);
  animation: slideIn .35s cubic-bezier(.16,1,.3,1) both;
  cursor: default;
  transition: background .2s;
}
.alert-item:hover { background: var(--surface2); }

@keyframes slideIn {
  from { opacity:0; transform:translateX(12px); }
  to   { opacity:1; transform:translateX(0); }
}

.alert-type {
  display: flex; align-items: center; gap: .4rem;
  margin-bottom: .3rem;
}
.alert-icon {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent2);
  box-shadow: var(--red-glow);
  flex-shrink: 0;
}
.alert-event {
  font-size: .65rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--accent2);
}
.alert-cam {
  font-size: .6rem; color: var(--text-dim);
  font-family: var(--mono);
  margin-left: auto;
}
.alert-msg {
  font-size: .68rem;
  color: var(--text);
  line-height: 1.5;
  font-family: var(--mono);
}
.alert-plate {
  display: inline-block;
  margin-top: .3rem;
  padding: .15rem .45rem;
  background: rgba(0,229,255,.1);
  border: 1px solid rgba(0,229,255,.25);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .1em;
  color: var(--accent);
}
.alert-time {
  font-family: var(--mono);
  font-size: .58rem;
  color: var(--text-dim);
  margin-top: .25rem;
}

.no-alerts {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 200px; gap: .75rem;
  color: var(--text-dim);
}
.no-alerts-icon {
  width: 36px; height: 36px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; opacity: .5;
}
.no-alerts-text {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .1em;
}

/* panel footer */
.panel-footer {
  padding: .6rem 1rem;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: space-between;
}
.history-link {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--accent);
  text-decoration: none;
  letter-spacing: .08em;
  display: flex; align-items: center; gap: .3rem;
  transition: opacity .2s;
}
.history-link:hover { opacity: .7; }
.alert-count-badge {
  font-family: var(--mono);
  font-size: .58rem;
  color: var(--text-dim);
  letter-spacing: .08em;
}

/* ── TTS notification toast ────────────────────────────────────────── */
.toast-container {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: .5rem;
  z-index: 9000; pointer-events: none;
}
.toast {
  background: rgba(255,59,92,.15);
  border: 1px solid rgba(255,59,92,.4);
  color: var(--accent2);
  font-family: var(--mono);
  font-size: .7rem;
  padding: .6rem 1.2rem;
  border-radius: var(--radius);
  backdrop-filter: blur(10px);
  animation: toastIn .3s ease both, toastOut .3s ease 3s both;
  letter-spacing: .06em;
}
@keyframes toastIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-6px)} }

/* ── Scrollbar ─────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── Responsive ────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .app-layout { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
  .alerts-panel { border-left: none; border-top: 1px solid var(--border); height: 280px; }
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    TRAFFIC<span style="color:var(--accent)">IQ</span>
  </div>
  <div class="header-time" id="hdrTime">--:--:--</div>
  <div class="status-pill">
    <div class="status-dot"></div>
    LIVE MONITORING
  </div>
</header>

<!-- ── Main layout ────────────────────────────────────────────────────── -->
<div class="app-layout">

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="statCameras">{{ cameras|length }}</div>
      <div class="stat-label">Active Cameras</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statVehicles">0</div>
      <div class="stat-label">Vehicles Detected</div>
    </div>
    <div class="stat-card">
      <div class="stat-value alert" id="statStopped">0</div>
      <div class="stat-label">Stopped Vehicles</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAlerts">0</div>
      <div class="stat-label">Total Alerts Today</div>
    </div>
  </div>

  <!-- Camera feeds -->
  <div class="camera-grid">
    {% for cam in cameras %}
    <div class="cam-tile">
      <div class="cam-header">
        <span class="cam-name">CAM {{ cam.id + 1 }} — {{ cam.name }}</span>
        <div class="cam-meta">
          <span class="cam-badge" id="badge-v-{{ cam.id }}">0 VEH</span>
          <span class="cam-badge red" id="badge-s-{{ cam.id }}" style="display:none">0 STOPPED</span>
        </div>
      </div>
      <div class="cam-feed">
        <img src="{{ url_for('video_feed', cam_id=cam.id) }}"
             alt="{{ cam.name }} feed"
             onerror="this.style.opacity='.3'">
        <div class="rec-indicator"><div class="rec-dot"></div>REC</div>
        <div class="cam-overlay">
          <div class="cam-stats-row">
            <span class="cam-stat-chip" id="chip-{{ cam.id }}">LIVE</span>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <!-- Alerts panel -->
  <div class="alerts-panel">
    <div class="panel-header">
      <span class="panel-title">⚠ Live Alerts</span>
      <button class="clear-btn" onclick="clearAlerts()">CLEAR</button>
    </div>
    <div class="alerts-list" id="alertsList">
      <div class="no-alerts" id="noAlerts">
        <div class="no-alerts-icon">✓</div>
        <span class="no-alerts-text">NO INCIDENTS</span>
      </div>
    </div>
    <div class="panel-footer">
      <a href="/history" class="history-link">→ Alert History</a>
      <span class="alert-count-badge" id="alertCountBadge">0 events</span>
    </div>
  </div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
const POLL_INTERVAL  = 2500;   // ms between alert polls
const STATS_INTERVAL = 3000;   // ms between stats polls
let knownAlerts = new Set();
let ttsQueue    = [];
let ttsPlaying  = false;

// ── Clock ──────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('hdrTime').textContent =
    new Date().toLocaleTimeString('en-GB', {hour12: false});
}
setInterval(updateClock, 1000);
updateClock();

// ── Alerts ─────────────────────────────────────────────────────────────
function clearAlerts() {
  knownAlerts.clear();
  document.getElementById('alertsList').innerHTML =
    `<div class="no-alerts" id="noAlerts">
       <div class="no-alerts-icon">✓</div>
       <span class="no-alerts-text">NO INCIDENTS</span>
     </div>`;
  document.getElementById('alertCountBadge').textContent = '0 events';
}

function renderAlert(a) {
  const key = `${a.camera}-${a.time}-${a.message}`;
  if (knownAlerts.has(key)) return;
  knownAlerts.add(key);

  const noAlert = document.getElementById('noAlerts');
  if (noAlert) noAlert.remove();

  const list = document.getElementById('alertsList');
  const div  = document.createElement('div');
  div.className = 'alert-item';

  const plate = (a.plate && a.plate !== 'N/A')
    ? `<div class="alert-plate">${a.plate}</div>` : '';

  div.innerHTML = `
    <div class="alert-type">
      <div class="alert-icon"></div>
      <span class="alert-event">STOPPED VEHICLE</span>
      <span class="alert-cam">${a.camera}</span>
    </div>
    <div class="alert-msg">${a.message}</div>
    ${plate}
    <div class="alert-time">${a.time}</div>`;
  list.prepend(div);

  // TTS
  if (a.tts) ttsQueue.push(a.tts);
  processTTS();

  // Toast
  showToast(`🚨 ${a.camera}: Stopped vehicle detected`);
}

function showToast(msg) {
  const c   = document.getElementById('toastContainer');
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;
  c.prepend(div);
  setTimeout(() => div.remove(), 3800);
}

function processTTS() {
  if (ttsPlaying || !ttsQueue.length || !window.speechSynthesis) return;
  const msg = ttsQueue.shift();
  const utter = new SpeechSynthesisUtterance(msg);
  utter.rate = 1.1;
  utter.onend = () => { ttsPlaying = false; processTTS(); };
  ttsPlaying = true;
  speechSynthesis.speak(utter);
}

async function pollAlerts() {
  try {
    const res    = await fetch('/api/alerts');
    const alerts = await res.json();
    alerts.forEach(renderAlert);
    document.getElementById('alertCountBadge').textContent =
      `${knownAlerts.size} event${knownAlerts.size !== 1 ? 's' : ''}`;
  } catch (_) {}
}

// ── Stats ───────────────────────────────────────────────────────────────
async function pollStats() {
  try {
    const res  = await fetch('/api/stats');
    const data = await res.json();

    let totalVeh = 0, totalStop = 0;
    data.cameras.forEach(cam => {
      totalVeh  += cam.vehicle_count;
      totalStop += cam.stopped_count;

      const bv = document.getElementById(`badge-v-${cam.cam_id}`);
      const bs = document.getElementById(`badge-s-${cam.cam_id}`);
      if (bv) bv.textContent = `${cam.vehicle_count} VEH`;
      if (bs) {
        bs.textContent = `${cam.stopped_count} STOPPED`;
        bs.style.display = cam.stopped_count > 0 ? '' : 'none';
      }
    });

    animateCounter('statVehicles', totalVeh);
    animateCounter('statStopped',  totalStop);
    animateCounter('statAlerts',   data.total_alerts);

    // Pulse stopped counter if > 0
    const sv = document.getElementById('statStopped');
    sv.classList.toggle('alert', totalStop > 0);
  } catch (_) {}
}

function animateCounter(id, target) {
  const el = document.getElementById(id);
  const from = parseInt(el.textContent) || 0;
  if (from === target) return;
  const step = (target - from) / 8;
  let cur = from;
  const t = setInterval(() => {
    cur += step;
    if ((step > 0 && cur >= target) || (step < 0 && cur <= target)) {
      cur = target; clearInterval(t);
    }
    el.textContent = Math.round(cur);
  }, 35);
}

// ── Boot ────────────────────────────────────────────────────────────────
pollAlerts();
pollStats();
setInterval(pollAlerts, POLL_INTERVAL);
setInterval(pollStats,  STATS_INTERVAL);
</script>
</body>
</html>
